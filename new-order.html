<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place New Order — R Company</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root{--maroon:#800020;--gold:#D4AF37;--gold-dark:#b8922d;--cream:#FFF8E7;--text-dark:#1A1A1A;--text-light:#fff;--border:#E5D5C0;--grey-100:#f7f5f2;--grey-500:#7a6f5f;--danger:#c0392b;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--shadow-md:0 4px 12px rgba(0,0,0,0.12);--shadow-lg:0 8px 24px rgba(0,0,0,0.16);--transition:all 0.3s ease}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;color:var(--text-dark);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600;line-height:1.3;color:var(--maroon)}
a{text-decoration:none;color:var(--maroon)}
.navbar{background:var(--maroon);position:sticky;top:0;z-index:1000;box-shadow:var(--shadow-md)}
.nav-container{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
.navbar-brand{display:flex;align-items:center;font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text-light)}
.navbar-brand .brand-text{color:var(--gold);font-size:2rem;margin-right:2px}
.navbar-nav{display:flex;align-items:center;gap:8px}
.nav-link{color:rgba(255,255,255,0.85);font-size:0.9rem;font-weight:500;padding:8px 16px;border-radius:var(--radius-md)}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.1)}
.nav-link.nav-btn{background:var(--gold);color:var(--text-dark);font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;border:2px solid transparent;border-radius:var(--radius-md);cursor:pointer;transition:var(--transition);text-decoration:none}
.btn-primary{background:var(--gold);color:var(--text-dark);border-color:var(--gold)}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-secondary{background:#e8e4df;color:var(--text-dark);border-color:#d4cfc7}
.btn-secondary:hover{background:#d4cfc7}
.btn-large{padding:14px 32px;font-size:1rem}
.btn-full{width:100%}
.new-order-page{padding:40px 24px;min-height:calc(100vh - 64px)}
.form-container{max-width:800px;margin:0 auto;background:#fff;border-radius:var(--radius-xl);padding:48px;box-shadow:var(--shadow-lg);border:2px solid var(--border)}
.form-header{margin-bottom:40px;padding-bottom:24px;border-bottom:2px solid var(--gold)}
.form-title{font-size:2rem;color:var(--maroon);margin-bottom:8px}
.form-subtitle{color:var(--grey-500)}
.form-section{margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--border)}
.form-section:last-of-type{border-bottom:none}
.form-section-title{font-size:1.1rem;color:var(--maroon);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--gold);display:inline-block}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-weight:600;font-size:0.9rem;color:var(--text-dark)}
.form-input,.form-select,.form-textarea{width:100%;padding:12px 16px;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--text-dark);background:#fff;border:2px solid var(--border);border-radius:var(--radius-md);transition:var(--transition)}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,0.15)}
.form-textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.form-hint{font-size:0.8rem;color:var(--grey-500)}
.required{color:var(--danger)}
.form-actions{display:flex;gap:16px;justify-content:flex-end;margin-top:32px;padding-top:24px;border-top:2px solid var(--border)}
.file-upload-wrapper{position:relative}
.file-input{position:absolute;width:1px;height:1px;opacity:0}
.file-upload-label{display:flex;flex-direction:column;align-items:center;gap:12px;padding:32px;border:2px dashed var(--border);border-radius:var(--radius-lg);background:var(--grey-100);cursor:pointer;transition:var(--transition);text-align:center}
.file-upload-label:hover{border-color:var(--gold);background:rgba(212,175,55,0.05)}
.upload-icon{font-size:2.5rem}
.upload-text{color:var(--text-dark);font-weight:600}
.upload-hint{color:var(--grey-500);font-size:0.85rem}
.selected-files{margin-top:8px}
@media(max-width:768px){.form-container{padding:24px}.form-row{grid-template-columns:1fr}.form-actions{flex-direction:column}.form-actions .btn{width:100%}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="shop-dashboard.html" class="navbar-brand"><span class="brand-text">R</span> COMPANY</a>
            <ul class="navbar-nav">
                <li><a href="shop-dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="new-order.html" class="nav-link nav-btn">+ New Order</a></li>
                <li><a href="login.html" class="nav-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="new-order-page">
        <div class="form-container">
            <div class="form-header">
                <h1 class="form-title">Place New Order</h1>
                <p class="form-subtitle">Fill in the details below. We will handle everything else.</p>
            </div>

            <form action="/orders/new" method="POST" enctype="multipart/form-data">
                
                <div class="form-section">
                    <h3 class="form-section-title">Product Information</h3>
                    <div class="form-group">
                        <label for="product_type">Product Type <span class="required">*</span></label>
                        <select id="product_type" name="product_type" class="form-select" required>
                            <option value="">Select product type</option>
                            <option value="Sherwani">Sherwani</option>
                            <option value="Kurta">Kurta</option>
                            <option value="Bandhgala">Bandhgala</option>
                            <option value="Coat">Coat</option>
                            <option value="Blazer">Blazer</option>
                            <option value="Jodhpuri">Jodhpuri</option>
                            <option value="Waistcoat">Waistcoat</option>
                            <option value="Indo-Western">Indo-Western</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-top:16px">
                        <label for="customer_name">Customer Name (Optional)</label>
                        <input type="text" id="customer_name" name="customer_name" class="form-input" placeholder="Enter customer name if available">
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Fabric Details</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fabric_type">Fabric Type <span class="required">*</span></label>
                            <select id="fabric_type" name="fabric_type" class="form-select" required>
                                <option value="">Select fabric</option>
                                <option value="Silk">Silk</option>
                                <option value="Velvet">Velvet</option>
                                <option value="Cotton">Cotton</option>
                                <option value="Brocade">Brocade</option>
                                <option value="Raw Silk">Raw Silk</option>
                                <option value="Organza">Organza</option>
                                <option value="Georgette">Georgette</option>
                                <option value="Satin">Satin</option>
                                <option value="Linen">Linen</option>
                                <option value="Wool">Wool</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="color">Color <span class="required">*</span></label>
                            <input type="text" id="color" name="color" class="form-input" placeholder="e.g., Royal Blue, Maroon, Gold" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Embroidery Details</h3>
                    <div class="form-group">
                        <label for="embroidery_details">Embroidery Details</label>
                        <textarea id="embroidery_details" name="embroidery_details" class="form-textarea" rows="4" placeholder="Describe the zari work needed. For example: Heavy gold zari work on collar and cuffs, floral pattern on front panel, pearl work on sleeves, etc."></textarea>
                        <p class="form-hint">Be as specific as possible for best results</p>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Measurements</h3>
                    <div class="form-group">
                        <label for="measurements">Measurements</label>
                        <textarea id="measurements" name="measurements" class="form-textarea" rows="4" placeholder="Shoulder: __ inches
Chest: __ inches
Waist: __ inches
Length: __ inches
Sleeve Length: __ inches
Any special notes:"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Timeline and Instructions</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="deadline">Deadline</label>
                            <input type="date" id="deadline" name="deadline" class="form-input">
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:16px">
                        <label for="special_instructions">Special Instructions</label>
                        <textarea id="special_instructions" name="special_instructions" class="form-textarea" rows="3" placeholder="Any special requirements or instructions for this order"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Reference Images</h3>
                    <div class="form-group">
                        <div class="file-upload-wrapper">
                            <input type="file" id="images" name="images" class="file-input" accept="image/*" multiple>
                            <label for="images" class="file-upload-label">
                                <span class="upload-icon">&#128247;</span>
                                <span class="upload-text">Click to upload or drag and drop</span>
                                <span class="upload-hint">Max 5 images, 10MB each (JPG, PNG, GIF, WebP)</span>
                            </label>
                        </div>
                        <div class="selected-files" id="selectedFiles"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="shop-dashboard.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-large">Place Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.querySelector('.file-input').addEventListener('change', function() {
            var label = document.querySelector('.upload-text');
            var files = document.getElementById('selectedFiles');
            if (this.files.length > 0) {
                label.textContent = this.files.length + ' file(s) selected';
                var html = '<div style="margin-top:8px;"><strong>Selected files:</strong><ul style="margin-top:4px;padding-left:20px;">';
                for (var i = 0; i < this.files.length; i++) {
                    html += '<li style="color:#555;font-size:0.85rem;">' + this.files[i].name + '</li>';
                }
                html += '</ul></div>';
                files.innerHTML = html;
            } else {
                label.textContent = 'Click to upload or drag and drop';
                files.innerHTML = '';
            }
        });
    </script>
</body>
</html>
