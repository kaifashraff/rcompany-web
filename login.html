<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — R Company</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root{--maroon:#800020;--maroon-dark:#5c0017;--gold:#D4AF37;--gold-light:#e8c45a;--cream:#FFF8E7;--text-dark:#1A1A1A;--text-light:#fff;--border:#E5D5C0;--grey-100:#f7f5f2;--grey-200:#e8e4df;--grey-400:#a89f91;--grey-500:#7a6f5f;--danger:#c0392b;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--shadow-md:0 4px 12px rgba(0,0,0,0.12);--shadow-lg:0 8px 24px rgba(0,0,0,0.16);--shadow-xl:0 12px 40px rgba(0,0,0,0.2);--transition:all 0.3s ease}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;color:var(--text-dark);background:linear-gradient(135deg,var(--cream) 0%,#f5ecd8 50%,var(--grey-200) 100%);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600;line-height:1.3;color:var(--maroon)}
/* NAVBAR */
.navbar{background:var(--maroon);position:sticky;top:0;z-index:1000;box-shadow:var(--shadow-md)}
.nav-container{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
.navbar-brand{display:flex;align-items:center;font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text-light)}
.navbar-brand .brand-text{color:var(--gold);font-size:2rem;margin-right:2px}
.navbar-nav{display:flex;align-items:center;gap:8px}
.nav-link{color:rgba(255,255,255,0.85);font-size:0.9rem;font-weight:500;padding:8px 16px;border-radius:var(--radius-md)}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.1)}
.nav-link.nav-btn{background:var(--gold);color:var(--text-dark);font-weight:600}
.nav-link.nav-btn:hover{background:var(--gold-light)}
/* AUTH */
.auth-page{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:60px 24px}
.auth-container{width:100%;max-width:460px}
.auth-card{background:#fff;border:3px solid var(--gold);border-radius:var(--radius-xl);padding:48px 40px;box-shadow:var(--shadow-xl)}
.auth-header{text-align:center;margin-bottom:32px}
.auth-title{font-size:2rem;color:var(--maroon);margin-bottom:8px}
.auth-subtitle{color:var(--grey-500);font-size:0.95rem}
.auth-form{display:flex;flex-direction:column;gap:20px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-weight:600;font-size:0.9rem;color:var(--text-dark)}
.form-input{width:100%;padding:12px 16px;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--text-dark);background:#fff;border:2px solid var(--border);border-radius:var(--radius-md);transition:var(--transition)}
.form-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,0.15)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;border:2px solid transparent;border-radius:var(--radius-md);cursor:pointer;transition:var(--transition);text-decoration:none}
.btn-primary{background:var(--gold);color:var(--text-dark);border-color:var(--gold)}
.btn-primary:hover{background:#b8922d;border-color:#b8922d;transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-full{width:100%}
.auth-footer{text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--border)}
.auth-footer a{color:var(--maroon);font-weight:600}
.auth-info{margin-top:20px;padding:16px;background:var(--grey-100);border-radius:var(--radius-md);text-align:center;font-size:0.85rem;color:var(--grey-500)}
.auth-info strong{color:var(--maroon)}
@media(max-width:768px){.auth-card{padding:32px 24px}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="navbar-brand"><span class="brand-text">R</span> COMPANY</a>
            <ul class="navbar-nav">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="login.html" class="nav-link">Login</a></li>
                <li><a href="register.html" class="nav-link nav-btn">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Login to your R Company partner account</p>
                </div>
                <form action="/login" method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                </form>
                <div class="auth-footer">
                    <p>Not registered yet? <a href="register.html">Create Partner Account</a></p>
                </div>
                <div class="auth-info">
                    <strong>Admin Login:</strong> admin@rcompany.com / Admin@123<br>
                    <strong>Demo Shop:</strong> arif@textiles.com / Demo@123
                </div>
            </div>
        </div>
    </div>
</body>
</html>
